services:
  # ── PostgreSQL + pgvector ──────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lndata_pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lndata
      POSTGRES_PASSWORD: lndata_secret
      POSTGRES_DB: lndata_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lndata -d lndata_db" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: lndata_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Python App（Pipeline / RAG）─────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lndata_app
    volumes:
      - .:/app # 掛載專案目錄，開發時即時同步
      - model_cache:/root/.cache # 快取 HuggingFace 模型，避免重建重下載
    environment:
      PG_HOST: postgres # Docker 內部用 service name
      PG_PORT: 5432
      PG_DB: lndata_db
      PG_USER: lndata
      PG_PASSWORD: lndata_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_API_KEY2: ${GOOGLE_API_KEY2:-}
      OPENAI_KEY: ${OPENAI_KEY:-}
      EMBEDDING_MODEL: BAAI/bge-base-zh-v1.5
      USER_ROLE: ${USER_ROLE:-admin}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18888:8888" # Jupyter Lab 對外開放
    stdin_open: true # 支援互動式 RAG 查詢
    tty: true
    # 啟動 Jupyter Lab，無密碼直接進入
    command: [ "jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--NotebookApp.token=''", "--NotebookApp.password=''" ]

  # ── Adminer (DB GUI) ──────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: lndata_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  model_cache:
